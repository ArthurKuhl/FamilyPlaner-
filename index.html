<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planer</title>
<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4f6f45">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planer">
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script src="sync.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --soil: #3a2e1f; --moss: #4f6f45; --sage: #7fa476; --leaf: #bcd196;
    --cream: #faf6ec; --bark: #7d6339; --terracotta: #c46b41;
    --navbg: #2a2016;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; font-family: 'Inter', system-ui, sans-serif;
    background: var(--cream); overflow: hidden;
  }
  :focus-visible { outline: 2px solid var(--terracotta); outline-offset: 2px; border-radius: 4px; }

  .shell { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* Hauptnavigation: gleichrangige Bereiche, horizontal scrollbar auf schmalen Screens */
  nav.modul-nav {
    background: var(--navbg); display: flex; align-items: center; gap: 4px; padding: 6px 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    scrollbar-width: none;
  }
  nav.modul-nav::-webkit-scrollbar { display: none; }
  .sync-status {
    flex: 0 0 auto; font-size: 0.95rem; padding: 4px 6px; opacity: 0.85; margin-left: auto; order: 99;
  }
  .backup-btn {
    flex: 0 0 auto; background: none; border: none; color: var(--sage); font-size: 0.95rem;
    padding: 4px 6px; opacity: 0.85; cursor: pointer; order: 98;
  }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(42,32,22,0.5); display: none;
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-bg.zeigen { display: flex; }
  .modal {
    background: var(--cream); border-radius: 18px; padding: 20px; width: 100%; max-width: 420px;
    max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.3); color: var(--soil);
  }
  .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .modal p { font-size: 0.82rem; color: var(--bark); line-height: 1.5; margin-bottom: 14px; }
  .modal .btn {
    display: block; width: 100%; padding: 12px; border-radius: 22px; border: none; font-weight: 700;
    font-size: 0.88rem; cursor: pointer; margin-bottom: 10px; text-align: center;
  }
  .modal .btn-primary { background: var(--moss); color: var(--leaf); }
  .modal .btn-secondary { background: #fff; color: var(--bark); border: 1px solid #ddd; }
  .modal .status-text { font-size: 0.8rem; margin-top: 4px; min-height: 18px; }
  .modal input[type="file"] { display: none; }
  .modul-btn {
    flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: transparent; border: none; color: var(--sage);
    font-family: 'Inter', sans-serif; font-size: 0.62rem; font-weight: 600;
    padding: 6px 12px; border-radius: 10px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.01em; min-width: 64px;
  }
  .modul-btn .em { font-size: 1.25rem; line-height: 1; }
  .modul-btn:hover { background: #3b2f1e; }
  .modul-btn.active { background: var(--moss); color: var(--leaf); }

  .modul-frame-wrap { flex: 1; position: relative; min-height: 0; }
  iframe.modul-frame {
    width: 100%; height: 100%; border: none; display: block; background: var(--cream);
  }

  .offline-hinweis {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%) translateY(120%);
    background: var(--soil); color: var(--leaf); font-size: 0.75rem; padding: 8px 16px;
    border-radius: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); transition: transform 0.25s;
    z-index: 50; pointer-events: none;
  }
  .offline-hinweis.zeigen { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="shell">
    <nav class="modul-nav" id="modulNav" aria-label="Bereiche">
      <!-- Buttons werden per JS erzeugt -->
      <button class="backup-btn" id="btnBackup" title="Sichern & Wiederherstellen">💾</button>
      <span class="sync-status" id="syncStatus" title="Sync-Status">⏳</span>
    </nav>
    <div class="modul-frame-wrap">
      <iframe class="modul-frame" id="modulFrame" title="Aktueller Bereich" allow="geolocation; notifications"></iframe>
    </div>
  </div>
  <div class="offline-hinweis" id="offlineHinweis">Offline – letzte gespeicherte Version wird angezeigt</div>

  <div class="modal-bg" id="modalBackup">
    <div class="modal">
      <h2>💾 Sichern &amp; Wiederherstellen</h2>
      <p>Exportiert alle Daten aus allen Bereichen (Garten, Termine, Einkauf, Kochen, Gesundheit, Gaming) als Datei – zusätzlich zur Cloud-Synchronisierung, als extra Sicherheitsnetz.</p>
      <button class="btn btn-primary" id="btnExport">⬇ Alle Daten exportieren</button>
      <button class="btn btn-secondary" id="btnImportOeffnen">⬆ Aus Datei wiederherstellen</button>
      <input type="file" id="fileImport" accept="application/json">
      <div class="status-text" id="backupStatus"></div>
      <button class="btn btn-secondary" id="btnBackupSchliessen" style="margin-top:6px;">Schließen</button>
    </div>
  </div>

  <script>
    // Zentrale Liste aller Bereiche. Neue Bereiche später einfach hier ergänzen:
    // src auf die fertige Modul-Datei zeigen lassen, sobald sie existiert.
    const MODULE = [
      { id: 'home',        label: 'Übersicht', emoji: '🏠', src: 'home.html' },
      { id: 'garten',      label: 'Garten',    emoji: '🌱', src: 'garten.html',
        syncKeys: ['gartenplaner_v3','gartenplaner_varieties','gartenplaner_bedTemplates','gartenplaner_recentPlants','gartenplaner_seedInventory','gartenplaner_costs','gartenplaner_pantry','gartenplaner_shops','gartenplaner_careDone'],
        syncTransform: (werte) => { if (werte.gartenplaner_v3 && window.PlanerSync) werte.gartenplaner_v3 = window.PlanerSync.entferneFotosTief(werte.gartenplaner_v3); return werte; } },
      { id: 'termine',     label: 'Termine',   emoji: '🗓️', src: 'termine.html', syncKeys: ['termine_events_v1'] },
      { id: 'gesundheit',  label: 'Gesundheit',emoji: '🏃', src: 'gesundheit.html', syncKeys: ['gesundheit_tageswerte','gesundheit_sport','gesundheit_rechner'] },
      { id: 'einkauf',     label: 'Einkauf',   emoji: '🛒', src: 'einkauf.html', syncKeys: ['einkauf_listen','einkauf_favoriten'] },
      { id: 'kochen',      label: 'Kochen',    emoji: '🍳', src: 'kochen.html', syncKeys: ['kochen_rezepte'] },
      { id: 'gaming',      label: 'Gaming',    emoji: '🎮', src: 'gaming.html', syncKeys: ['gaming_spiele'] },
    ];
    const STORAGE_KEY = 'planer_aktiverBereich';

    const nav = document.getElementById('modulNav');
    const frame = document.getElementById('modulFrame');

    function bereichLaden(id, { schreiben = true } = {}) {
      const mod = MODULE.find(m => m.id === id) || MODULE[0];
      frame.src = mod.src;
      nav.querySelectorAll('.modul-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.id === mod.id);
        btn.setAttribute('aria-current', btn.dataset.id === mod.id ? 'page' : 'false');
      });
      if (schreiben) {
        try { localStorage.setItem(STORAGE_KEY, mod.id); } catch (e) {}
      }
    }

    MODULE.forEach(mod => {
      const btn = document.createElement('button');
      btn.className = 'modul-btn';
      btn.dataset.id = mod.id;
      btn.innerHTML = `<span class="em" aria-hidden="true">${mod.emoji}</span><span>${mod.label}</span>`;
      btn.addEventListener('click', () => bereichLaden(mod.id));
      nav.appendChild(btn);
    });

    let start = 'home';
    try {
      const gespeichert = localStorage.getItem(STORAGE_KEY);
      if (gespeichert && MODULE.some(m => m.id === gespeichert)) start = gespeichert;
    } catch (e) {}
    bereichLaden(start, { schreiben: false });

    // Erlaubt Modulen (z.B. der Startseite), per Kachel-Klick zu einem anderen Bereich zu wechseln
    window.addEventListener('message', (e) => {
      if (e.origin !== window.location.origin) return;
      if (e.data && e.data.type === 'navigiere' && e.data.modul) bereichLaden(e.data.modul);
    });

    // Offline-/Online-Hinweis
    const hinweis = document.getElementById('offlineHinweis');
    let hinweisTimer;
    function zeigeHinweis() {
      if (!navigator.onLine) {
        hinweis.classList.add('zeigen');
        clearTimeout(hinweisTimer);
        hinweisTimer = setTimeout(() => hinweis.classList.remove('zeigen'), 3500);
      }
    }
    window.addEventListener('offline', zeigeHinweis);
    window.addEventListener('load', () => { if (!navigator.onLine) zeigeHinweis(); });

    // Sync-Status: die Module schreiben ihren Stand in einen gemeinsamen localStorage-Schlüssel,
    // die Shell liest ihn regelmäßig aus (Module laufen in eigenen Iframes, daher kein direkter Zugriff)
    const syncSymbole = {
      verbindet: '⏳', online: '☁️', fehler: '⚠️', nicht_verfuegbar: '📵', unbekannt: '⏳',
    };
    const syncTitel = {
      verbindet: 'Verbinde mit der Cloud …', online: 'Synchronisiert', fehler: 'Sync-Fehler – Änderungen bleiben lokal gespeichert',
      nicht_verfuegbar: 'Cloud-Sync nicht verfügbar', unbekannt: 'Sync-Status unbekannt',
    };
    function syncStatusAktualisieren() {
      let status = 'unbekannt';
      try { status = localStorage.getItem('planer_syncStatus') || 'unbekannt'; } catch (e) {}
      const el = document.getElementById('syncStatus');
      el.textContent = syncSymbole[status] || '⏳';
      el.title = syncTitel[status] || 'Sync-Status: ' + status;
    }
    syncStatusAktualisieren();
    setInterval(syncStatusAktualisieren, 2000);

    // ============================================================
    // GESAMT-BACKUP: Export/Import aller App-Daten
    // ============================================================
    // Schlüssel, die bewusst NICHT exportiert/importiert werden: geräte-/sitzungsspezifisch,
    // würden auf einem anderen Gerät keinen Sinn ergeben oder sich automatisch neu bilden.
    const BACKUP_AUSSCHLUSS = ['planer_geraeteId', 'planer_syncStatus'];

    function alleBackupSchluessel() {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && BACKUP_AUSSCHLUSS.indexOf(k) === -1) keys.push(k);
      }
      return keys;
    }

    function backupExportieren() {
      const daten = {};
      alleBackupSchluessel().forEach((k) => { daten[k] = localStorage.getItem(k); });
      const paket = { app: 'Familienplaner', version: 1, erstelltAm: new Date().toISOString(), daten: daten };
      const blob = new Blob([JSON.stringify(paket, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const zeitstempel = new Date().toISOString().replace(/[:T]/g, '-').slice(0, 16);
      a.href = url;
      a.download = 'planer-backup-' + zeitstempel + '.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      document.getElementById('backupStatus').textContent = '✅ Exportiert: ' + alleBackupSchluessel().length + ' Schlüssel.';
    }

    function backupWiederherstellen(datei) {
      const status = document.getElementById('backupStatus');
      status.textContent = 'Lese Datei …';
      const reader = new FileReader();
      reader.onerror = () => { status.textContent = '⚠️ Datei konnte nicht gelesen werden.'; };
      reader.onload = () => {
        let paket;
        try { paket = JSON.parse(reader.result); }
        catch (e) { status.textContent = '⚠️ Das ist keine gültige Backup-Datei.'; return; }
        if (!paket || typeof paket.daten !== 'object') { status.textContent = '⚠️ Das ist keine gültige Backup-Datei.'; return; }

        const anzahl = Object.keys(paket.daten).length;
        const datum = paket.erstelltAm ? new Date(paket.erstelltAm).toLocaleString('de-DE') : 'unbekannt';
        const bestaetigt = confirm(
          'Backup vom ' + datum + ' mit ' + anzahl + ' Einträgen wiederherstellen?\n\n' +
          'ACHTUNG: Dies überschreibt die aktuellen Daten auf ALLEN synchronisierten Geräten mit dem Stand aus dieser Datei. ' +
          'Neuere Änderungen (z.B. von deiner Frau), die nach dem Erstellen dieses Backups gemacht wurden, gehen dabei verloren.\n\n' +
          'Fortfahren?'
        );
        if (!bestaetigt) { status.textContent = 'Abgebrochen.'; return; }

        Object.keys(paket.daten).forEach((k) => {
          if (BACKUP_AUSSCHLUSS.indexOf(k) !== -1) return;
          try { localStorage.setItem(k, paket.daten[k]); } catch (e) {}
        });

        status.textContent = '✅ ' + anzahl + ' Einträge wiederhergestellt. Synchronisiere mit der Cloud …';

        // Wiederhergestellte Daten aktiv in die Cloud zurückschreiben, statt zu warten,
        // bis jeder Bereich einzeln geöffnet wird (sonst könnte der alte Cloud-Stand
        // die gerade wiederhergestellten Daten wieder überschreiben).
        if (window.PlanerSync) {
          const pushes = MODULE.filter(m => m.syncKeys).map(m => window.PlanerSync.pushWerte(m.id, m.syncKeys, m.syncTransform));
          Promise.all(pushes).then(() => {
            status.textContent = '✅ Wiederhergestellt und mit der Cloud synchronisiert.';
            frame.src = frame.src; // aktuellen Bereich neu laden, damit er die neuen Daten zeigt
          }).catch(() => {
            status.textContent = '✅ Lokal wiederhergestellt, aber Cloud-Sync teilweise fehlgeschlagen. Bitte Internetverbindung prüfen.';
            frame.src = frame.src;
          });
        } else {
          frame.src = frame.src;
        }
      };
      reader.readAsText(datei);
    }

    const modalBackup = document.getElementById('modalBackup');
    document.getElementById('btnBackup').addEventListener('click', () => {
      document.getElementById('backupStatus').textContent = '';
      modalBackup.classList.add('zeigen');
    });
    document.getElementById('btnBackupSchliessen').addEventListener('click', () => modalBackup.classList.remove('zeigen'));
    modalBackup.addEventListener('click', (e) => { if (e.target.id === 'modalBackup') modalBackup.classList.remove('zeigen'); });
    document.getElementById('btnExport').addEventListener('click', backupExportieren);
    document.getElementById('btnImportOeffnen').addEventListener('click', () => document.getElementById('fileImport').click());
    document.getElementById('fileImport').addEventListener('change', (e) => {
      if (e.target.files && e.target.files[0]) backupWiederherstellen(e.target.files[0]);
      e.target.value = '';
    });

    // ============================================================
    // WASSER-ERINNERUNG: periodische Prüfung (läuft dauerhaft in der Shell,
    // unabhängig davon welcher Bereich gerade angezeigt wird)
    // ============================================================
    const KEY_WASSER_ERINNERUNG = 'gesundheit_wasserErinnerung';
    const KEY_WASSER_LETZTE = 'gesundheit_wasserLetzteAusloesung';

    function pruefeWasserErinnerung() {
      let einstellung;
      try { einstellung = JSON.parse(localStorage.getItem(KEY_WASSER_ERINNERUNG) || 'null'); } catch (e) { einstellung = null; }
      if (!einstellung || !einstellung.aktiv || !Array.isArray(einstellung.zeiten) || !einstellung.zeiten.length) return;
      if (!('Notification' in window) || Notification.permission !== 'granted') return;

      const jetzt = new Date();
      const heuteISO = jetzt.getFullYear() + '-' + String(jetzt.getMonth() + 1).padStart(2, '0') + '-' + String(jetzt.getDate()).padStart(2, '0');
      const aktuelleZeit = String(jetzt.getHours()).padStart(2, '0') + ':' + String(jetzt.getMinutes()).padStart(2, '0');

      let letzte;
      try { letzte = JSON.parse(localStorage.getItem(KEY_WASSER_LETZTE) || 'null'); } catch (e) { letzte = null; }
      if (!letzte || letzte.datum !== heuteISO) letzte = { datum: heuteISO, ausgeloest: [] };

      let geaendert = false;
      einstellung.zeiten.forEach((zeit) => {
        if (zeit === aktuelleZeit && letzte.ausgeloest.indexOf(zeit) === -1) {
          letzte.ausgeloest.push(zeit);
          geaendert = true;
          const anzeigen = (reg) => reg.showNotification('💧 Zeit zu trinken!', {
            body: 'Denk an ein Glas Wasser.', icon: 'icon-192.png', badge: 'icon-192.png', tag: 'wasser-erinnerung-' + zeit,
          });
          if (navigator.serviceWorker && navigator.serviceWorker.ready) {
            navigator.serviceWorker.ready.then(anzeigen).catch(() => {
              try { new Notification('💧 Zeit zu trinken!', { body: 'Denk an ein Glas Wasser.', icon: 'icon-192.png' }); } catch (e2) {}
            });
          } else {
            try { new Notification('💧 Zeit zu trinken!', { body: 'Denk an ein Glas Wasser.', icon: 'icon-192.png' }); } catch (e2) {}
          }
        }
      });
      if (geaendert) { try { localStorage.setItem(KEY_WASSER_LETZTE, JSON.stringify(letzte)); } catch (e) {} }
    }
    setInterval(pruefeWasserErinnerung, 30000);
    pruefeWasserErinnerung();

    // ============================================================
    // TERMIN-ERINNERUNGEN: periodische Prüfung (läuft dauerhaft in der Shell)
    // ============================================================
    const KEY_TERMINE = 'termine_events_v1';
    const KEY_TERMINE_GEFEUERT = 'termine_erinnerungenGefeuert';

    function toISODatumT(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

    function terminFaelltAufTag(ev, tagISO) {
      let d = new Date(ev.date);
      const bisWiederholung = ev.recurrence && ev.recurrence.until ? new Date(ev.recurrence.until) : null;
      const freq = ev.recurrence ? ev.recurrence.freq : 'keine';
      const tagDatum = new Date(tagISO);
      let z = 0;
      while (d <= tagDatum && z < 500) {
        z++;
        if (bisWiederholung && d > bisWiederholung) return false;
        if (toISODatumT(d) === tagISO) return true;
        if (freq === 'keine') return false;
        if (freq === 'woechentlich') d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 7);
        else if (freq === 'monatlich') d = new Date(d.getFullYear(), d.getMonth() + 1, d.getDate());
        else if (freq === 'jaehrlich') d = new Date(d.getFullYear() + 1, d.getMonth(), d.getDate());
        else return false;
      }
      return false;
    }

    function pruefeTerminErinnerungen() {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      let events;
      try { events = JSON.parse(localStorage.getItem(KEY_TERMINE) || '[]'); } catch (e) { events = []; }
      if (!events || !events.length) return;

      const jetzt = new Date();
      const heuteISO = toISODatumT(jetzt);
      const morgen = new Date(jetzt); morgen.setDate(morgen.getDate() + 1);
      const morgenISO = toISODatumT(morgen);

      let gefeuert;
      try { gefeuert = JSON.parse(localStorage.getItem(KEY_TERMINE_GEFEUERT) || 'null'); } catch (e) { gefeuert = null; }
      if (!gefeuert || gefeuert.datum !== heuteISO) gefeuert = { datum: heuteISO, ausgeloest: [] };

      let geaendert = false;
      events.forEach((ev) => {
        if (!ev.erinnerung) return;
        [heuteISO, morgenISO].forEach((tagISO) => {
          if (!terminFaelltAufTag(ev, tagISO)) return;
          const startZeit = ev.allDay ? '08:00' : (ev.startTime || '09:00');
          const [sh, sm] = startZeit.split(':').map(Number);
          const startDatum = new Date(tagISO + 'T00:00:00');
          startDatum.setHours(sh, sm, 0, 0);
          const triggerDatum = new Date(startDatum.getTime() - ev.erinnerung * 60000);
          const marker = ev.id + '|' + tagISO;
          const gleicheMinute = Math.abs(jetzt.getTime() - triggerDatum.getTime()) < 30000;
          if (gleicheMinute && gefeuert.ausgeloest.indexOf(marker) === -1) {
            gefeuert.ausgeloest.push(marker);
            geaendert = true;
            const titel = '🗓️ ' + ev.title;
            const body = ev.allDay ? 'Heute' : ('Beginnt um ' + startZeit + ' Uhr') + (ev.location ? ' · ' + ev.location : '');
            const anzeigen = (reg) => reg.showNotification(titel, { body: body, icon: 'icon-192.png', badge: 'icon-192.png', tag: 'termin-' + marker });
            if (navigator.serviceWorker && navigator.serviceWorker.ready) {
              navigator.serviceWorker.ready.then(anzeigen).catch(() => {
                try { new Notification(titel, { body: body, icon: 'icon-192.png' }); } catch (e2) {}
              });
            } else {
              try { new Notification(titel, { body: body, icon: 'icon-192.png' }); } catch (e2) {}
            }
          }
        });
      });
      if (geaendert) { try { localStorage.setItem(KEY_TERMINE_GEFEUERT, JSON.stringify(gefeuert)); } catch (e) {} }
    }
    setInterval(pruefeTerminErinnerungen, 30000);
    pruefeTerminErinnerungen();

    // Service Worker registrieren (nur die Shell macht das, nicht die einzelnen Module)
    // Funktioniert nur über http(s):// oder localhost, nicht über file://
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(err => {
          console.warn('Service Worker Registrierung fehlgeschlagen:', err);
        });
      });
    }
  </script>
</body>
</html>
