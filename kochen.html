<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kochen & Backen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --soil: #3a2e1f; --moss: #4f6f45; --sage: #7fa476; --leaf: #bcd196;
    --cream: #faf6ec; --parchment: #ece0c7; --bark: #7d6339;
    --terracotta: #c46b41; --terracotta-text: #a8532e; --sky: #5b8bb5;
    --white: #fffdf8; --navbg: #2a2016;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px; --radius-pill: 22px;
    --shadow-soft: 0 2px 10px rgba(59,47,30,0.08); --shadow-md: 0 8px 26px rgba(59,47,30,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--soil); min-height: 100vh; padding-bottom: 40px; }
  button, input, select, textarea { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  :focus-visible { outline: 2px solid var(--terracotta); outline-offset: 2px; border-radius: 4px; }

  header.top { background: var(--navbg); color: var(--leaf); padding: 10px 12px; }
  header.top .titel-zeile { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  header.top h1 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
  .add-btn {
    background: var(--terracotta); color: var(--white); border: none; border-radius: var(--radius-pill);
    font-size: 0.82rem; font-weight: 700; padding: 7px 15px; cursor: pointer;
  }
  .suchzeile { display: flex; gap: 8px; margin-bottom: 8px; }
  .suchzeile input {
    flex: 1; padding: 9px 12px; border-radius: var(--radius-pill); border: none; font-size: 0.85rem;
    background: #1e160f; color: var(--leaf);
  }
  .suchzeile input::placeholder { color: #6b7a63; }
  .filter-reihe { display: flex; gap: 5px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; scrollbar-width: none; }
  .filter-reihe::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex: 0 0 auto; background: transparent; border: 1px solid #4a3a28; color: var(--sage); font-size: 0.72rem;
    font-weight: 600; padding: 5px 12px; border-radius: var(--radius-pill); cursor: pointer; white-space: nowrap;
  }
  .filter-chip.active { background: var(--moss); color: var(--leaf); border-color: var(--moss); }

  main { padding: 12px 14px; max-width: 680px; margin: 0 auto; }

  .rezept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .rezept-karte {
    background: var(--white); border-radius: var(--radius-md); padding: 12px; box-shadow: var(--shadow-soft);
    cursor: pointer; position: relative; display: flex; flex-direction: column; gap: 6px;
  }
  .rezept-karte .herz {
    position: absolute; top: 8px; right: 8px; background: none; border: none; font-size: 1rem; cursor: pointer; opacity: 0.6;
  }
  .rezept-karte .herz.aktiv { opacity: 1; }
  .rezept-kat-icon { font-size: 1.6rem; }
  .rezept-titel { font-size: 0.88rem; font-weight: 700; line-height: 1.25; padding-right: 18px; }
  .rezept-meta { font-size: 0.68rem; color: var(--bark); display: flex; gap: 8px; }

  .leer-hinweis { text-align: center; color: var(--bark); font-size: 0.85rem; padding: 46px 16px; opacity: 0.75; }
  .leer-hinweis .em { font-size: 2.2rem; display: block; margin-bottom: 8px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(42,32,22,0.45); display: none; align-items: flex-end; justify-content: center; z-index: 100; padding-top: 6vh; }
  .modal-bg.zeigen { display: flex; }
  .modal { background: var(--cream); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 18px 18px 24px; width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-md); }
  @media (min-width: 600px) { .modal-bg { align-items: center; } .modal { border-radius: var(--radius-lg); } }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 12px; }

  .feld { margin-bottom: 12px; }
  .feld label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--bark); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
  .feld input, .feld select, .feld textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--parchment); border-radius: var(--radius-sm); font-size: 0.9rem; background: var(--white); color: var(--soil); }
  .feld textarea { resize: vertical; min-height: 46px; }
  .zeile { display: flex; gap: 10px; }
  .zeile .feld { flex: 1; }
  .kategorie-reihe { display: flex; gap: 6px; flex-wrap: wrap; }
  .kategorie-opt { padding: 6px 12px; border-radius: var(--radius-pill); font-size: 0.72rem; font-weight: 600; border: 1px solid var(--parchment); background: var(--white); color: var(--bark); cursor: pointer; }
  .kategorie-opt.aktiv { color: var(--white); border-color: transparent; }

  .unterliste-titel { font-size: 0.72rem; font-weight: 700; color: var(--bark); text-transform: uppercase; letter-spacing: 0.03em; margin: 16px 0 6px; }
  .zutat-zeile, .schritt-zeile { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .zutat-zeile input.menge { width: 60px; flex: 0 0 60px; }
  .zutat-zeile input.einheit { width: 68px; flex: 0 0 68px; }
  .zutat-zeile input.name, .schritt-zeile textarea { flex: 1; }
  .schritt-zeile .schritt-nr { font-size: 0.78rem; font-weight: 700; color: var(--bark); flex: 0 0 20px; padding-top: 8px; }
  .zeile-entfernen { background: none; border: none; color: var(--parchment); font-size: 1.05rem; padding: 4px 6px; cursor: pointer; flex: 0 0 auto; }
  .zeile-entfernen:hover { color: var(--terracotta-text); }
  .zeile-hinzufuegen { background: var(--white); border: 1px dashed var(--sage); color: var(--moss); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 0.78rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 2px; }

  .modal-btns { display: flex; gap: 8px; margin-top: 18px; }
  .btn { flex: 1; padding: 11px; border-radius: var(--radius-pill); border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
  .btn-primary { background: var(--moss); color: var(--leaf); }
  .btn-secondary { background: var(--white); color: var(--bark); border: 1px solid var(--parchment); }
  .btn-danger { background: transparent; color: var(--terracotta-text); border: 1px solid var(--terracotta); }

  /* Detailansicht */
  .detail-kopf { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .detail-kat-chip { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-pill); }
  .detail-meta-reihe { display: flex; gap: 14px; font-size: 0.78rem; color: var(--bark); margin: 6px 0 14px; flex-wrap: wrap; }
  .portionen-steuerung { display: flex; align-items: center; gap: 10px; background: var(--white); border-radius: var(--radius-pill); padding: 6px 6px; margin-bottom: 16px; width: fit-content; box-shadow: var(--shadow-soft); }
  .portionen-steuerung button { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--parchment); color: var(--soil); font-size: 1rem; cursor: pointer; }
  .portionen-steuerung .wert { font-size: 0.85rem; font-weight: 700; min-width: 90px; text-align: center; }
  .zutaten-liste-anzeige { list-style: none; margin-bottom: 16px; }
  .zutaten-liste-anzeige li { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--parchment); font-size: 0.88rem; }
  .zutaten-liste-anzeige .z-menge { font-weight: 700; color: var(--moss); min-width: 64px; }
  .schritte-liste-anzeige { list-style: none; }
  .schritte-liste-anzeige li { display: flex; gap: 10px; padding: 8px 0; font-size: 0.88rem; line-height: 1.4; }
  .schritte-liste-anzeige .s-nr {
    flex: 0 0 24px; height: 24px; border-radius: 50%; background: var(--moss); color: var(--leaf);
    display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700;
  }
  .notiz-box { background: var(--parchment); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 0.82rem; margin-top: 14px; color: var(--bark); }
</style>
</head>
<body>

<header class="top">
  <div class="titel-zeile">
    <h1>🍳 Kochen &amp; Backen</h1>
    <button class="add-btn" id="btnNeu">＋ Neu</button>
  </div>
  <div class="suchzeile">
    <input type="text" id="fSuche" placeholder="Rezept suchen ...">
  </div>
  <div class="filter-reihe" id="filterReihe"></div>
</header>

<main>
  <div class="rezept-grid" id="rezeptGrid"></div>
  <div class="leer-hinweis" id="leerHinweis" style="display:none;">
    <span class="em">🍲</span><span id="leerText">Noch keine Rezepte. Tippe auf „＋ Neu“, um eins anzulegen.</span>
  </div>
</main>

<!-- Detailansicht -->
<div class="modal-bg" id="modalDetail">
  <div class="modal">
    <div class="detail-kopf">
      <span class="detail-kat-chip" id="detailKatChip"></span>
      <button class="herz" id="detailHerz" style="position:static; font-size:1.3rem;">♡</button>
    </div>
    <h2 id="detailTitel"></h2>
    <div class="detail-meta-reihe" id="detailMeta"></div>
    <div class="portionen-steuerung">
      <button id="btnPortionenMinus">−</button>
      <span class="wert" id="portionenWert"></span>
      <button id="btnPortionenPlus">+</button>
    </div>
    <div class="unterliste-titel">Zutaten</div>
    <ul class="zutaten-liste-anzeige" id="detailZutaten"></ul>
    <div class="unterliste-titel">Zubereitung</div>
    <ol class="schritte-liste-anzeige" id="detailSchritte"></ol>
    <div class="notiz-box" id="detailNotizBox" style="display:none;"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="btnDetailSchliessen">Schließen</button>
      <button class="btn btn-primary" id="btnZumEinkauf">🛒 Zum Einkauf</button>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="btnDetailBearbeiten">Bearbeiten</button>
    </div>
  </div>
</div>

<!-- Bearbeiten / Neu -->
<div class="modal-bg" id="modalEdit">
  <div class="modal">
    <h2 id="editTitelKopf">Neues Rezept</h2>
    <div class="feld">
      <label for="fTitel">Titel</label>
      <input type="text" id="fTitel" placeholder="z.B. Kürbissuppe">
    </div>
    <div class="feld">
      <label>Kategorie</label>
      <div class="kategorie-reihe" id="editKategorieReihe"></div>
    </div>
    <div class="zeile">
      <div class="feld">
        <label for="fPortionen">Portionen (Basis)</label>
        <input type="number" id="fPortionen" min="1" value="4">
      </div>
      <div class="feld">
        <label for="fZeit">Zubereitungszeit (Min.)</label>
        <input type="number" id="fZeit" min="0" value="30">
      </div>
    </div>

    <div class="unterliste-titel">Zutaten</div>
    <div id="editZutatenListe"></div>
    <button class="zeile-hinzufuegen" id="btnZutatHinzufuegen">＋ Zutat hinzufügen</button>

    <div class="unterliste-titel">Zubereitungsschritte</div>
    <div id="editSchritteListe"></div>
    <button class="zeile-hinzufuegen" id="btnSchrittHinzufuegen">＋ Schritt hinzufügen</button>

    <div class="feld" style="margin-top:14px;">
      <label for="fNotiz">Notiz (optional)</label>
      <textarea id="fNotiz" placeholder="z.B. Tipps, Varianten ..."></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn btn-secondary" id="btnEditAbbrechen">Abbrechen</button>
      <button class="btn btn-primary" id="btnEditSpeichern">Speichern</button>
    </div>
    <div class="modal-btns" id="editLoeschZeile" style="display:none;">
      <button class="btn btn-danger" id="btnEditLoeschen">Rezept löschen</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  const KEY_REZEPTE = 'kochen_rezepte';
  const KEY_EINKAUF_LISTEN = 'einkauf_listen';
  const KEY_EINKAUF_AKTIV = 'einkauf_aktiveListe';

  const KATEGORIEN = [
    { id: 'fruehstueck', label: 'Frühstück',   icon: '🍳', farbe: '#4f6f45' },
    { id: 'hauptspeise', label: 'Hauptspeise', icon: '🍲', farbe: '#c46b41' },
    { id: 'beilage',     label: 'Beilage',     icon: '🥗', farbe: '#7fa476' },
    { id: 'dessert',     label: 'Dessert',     icon: '🍰', farbe: '#5b8bb5' },
    { id: 'gebaeck',     label: 'Gebäck',      icon: '🥐', farbe: '#7d6339' },
    { id: 'getraenke',   label: 'Getränke',    icon: '🥤', farbe: '#a8532e' },
    { id: 'sonstiges',   label: 'Sonstiges',   icon: '📦', farbe: '#7d6339' },
  ];

  function kategorieInfo(id) { return KATEGORIEN.find(k => k.id === id) || KATEGORIEN[KATEGORIEN.length-1]; }
  function neueId(prefix) { return prefix + Date.now() + Math.random().toString(36).slice(2,7); }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function laden(key, fallback) {
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
    catch (e) { console.warn('Kochen: Laden fehlgeschlagen', key, e); return fallback; }
  }
  function speichern(key, wert) {
    try { localStorage.setItem(key, JSON.stringify(wert)); }
    catch (e) { console.warn('Kochen: Speichern fehlgeschlagen', key, e); alert('Speichern fehlgeschlagen – ist der Speicher voll?'); }
  }

  let rezepte = laden(KEY_REZEPTE, []);
  let aktiverFilter = 'alle';
  let nurFavoriten = false;
  let suchtext = '';
  let bearbeiteId = null;
  let detailId = null;
  let detailPortionen = 1;

  function speichernRezepte() { speichern(KEY_REZEPTE, rezepte); }

  // --- FILTERLEISTE ---
  function renderFilter() {
    const box = document.getElementById('filterReihe');
    box.innerHTML = '';
    const alleChip = document.createElement('button');
    alleChip.className = 'filter-chip' + (aktiverFilter === 'alle' ? ' active' : '');
    alleChip.textContent = 'Alle';
    alleChip.addEventListener('click', () => { aktiverFilter = 'alle'; renderFilter(); renderGrid(); });
    box.appendChild(alleChip);

    KATEGORIEN.forEach(k => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (aktiverFilter === k.id ? ' active' : '');
      chip.textContent = k.icon + ' ' + k.label;
      chip.addEventListener('click', () => { aktiverFilter = k.id; renderFilter(); renderGrid(); });
      box.appendChild(chip);
    });

    const favChip = document.createElement('button');
    favChip.className = 'filter-chip' + (nurFavoriten ? ' active' : '');
    favChip.textContent = '♥ Favoriten';
    favChip.addEventListener('click', () => { nurFavoriten = !nurFavoriten; renderFilter(); renderGrid(); });
    box.appendChild(favChip);
  }
  document.getElementById('fSuche').addEventListener('input', (e) => { suchtext = e.target.value.trim().toLowerCase(); renderGrid(); });

  // --- GRID ---
  function gefilterteRezepte() {
    return rezepte.filter(r => {
      if (aktiverFilter !== 'alle' && r.kategorie !== aktiverFilter) return false;
      if (nurFavoriten && !r.favorit) return false;
      if (suchtext && !r.titel.toLowerCase().includes(suchtext)) return false;
      return true;
    });
  }

  function renderGrid() {
    const box = document.getElementById('rezeptGrid');
    box.innerHTML = '';
    const liste = gefilterteRezepte();
    document.getElementById('leerHinweis').style.display = liste.length ? 'none' : '';
    document.getElementById('leerText').textContent = rezepte.length
      ? 'Keine Rezepte gefunden. Filter oder Suche anpassen.'
      : 'Noch keine Rezepte. Tippe auf „＋ Neu“, um eins anzulegen.';
    liste.forEach(r => box.appendChild(rezeptKarte(r)));
  }

  function rezeptKarte(r) {
    const kat = kategorieInfo(r.kategorie);
    const karte = document.createElement('div');
    karte.className = 'rezept-karte';
    karte.innerHTML =
      '<button class="herz' + (r.favorit ? ' aktiv' : '') + '" data-id="' + r.id + '">' + (r.favorit ? '♥' : '♡') + '</button>' +
      '<div class="rezept-kat-icon">' + kat.icon + '</div>' +
      '<div class="rezept-titel">' + escapeHtml(r.titel) + '</div>' +
      '<div class="rezept-meta"><span>⏱ ' + r.zeit + ' Min.</span><span>🍽 ' + r.portionenBasis + '</span></div>';
    karte.querySelector('.herz').addEventListener('click', (e) => {
      e.stopPropagation();
      r.favorit = !r.favorit;
      speichernRezepte();
      renderGrid();
    });
    karte.addEventListener('click', () => detailOeffnen(r.id));
    return karte;
  }

  // --- ZAHLENFORMAT für skalierte Mengen ---
  function formatZahl(n) {
    if (Math.abs(n - Math.round(n)) < 0.01) return String(Math.round(n));
    return n.toLocaleString('de-DE', { maximumFractionDigits: 2 });
  }

  // --- DETAILANSICHT ---
  function detailOeffnen(id) {
    const r = rezepte.find(x => x.id === id);
    if (!r) return;
    detailId = id;
    detailPortionen = r.portionenBasis;
    const kat = kategorieInfo(r.kategorie);
    document.getElementById('detailKatChip').textContent = kat.icon + ' ' + kat.label;
    document.getElementById('detailKatChip').style.background = kat.farbe + '22';
    document.getElementById('detailKatChip').style.color = kat.farbe;
    document.getElementById('detailTitel').textContent = r.titel;
    document.getElementById('detailMeta').innerHTML = '<span>⏱ ' + r.zeit + ' Min.</span>';
    const herz = document.getElementById('detailHerz');
    herz.textContent = r.favorit ? '♥' : '♡';
    herz.classList.toggle('aktiv', !!r.favorit);
    document.getElementById('detailNotizBox').style.display = r.notiz ? '' : 'none';
    document.getElementById('detailNotizBox').textContent = r.notiz || '';
    renderDetailPortionenAbhaengig(r);
    document.getElementById('modalDetail').classList.add('zeigen');
  }
  function renderDetailPortionenAbhaengig(r) {
    document.getElementById('portionenWert').textContent = detailPortionen + ' Portion' + (detailPortionen === 1 ? '' : 'en');
    const faktor = detailPortionen / r.portionenBasis;
    const zutBox = document.getElementById('detailZutaten');
    zutBox.innerHTML = '';
    r.zutaten.forEach(z => {
      const li = document.createElement('li');
      const menge = z.menge ? formatZahl(parseFloat(z.menge.toString().replace(',','.')) * faktor) : '';
      li.innerHTML = '<span class="z-menge">' + escapeHtml([menge, z.einheit].filter(Boolean).join(' ')) + '</span><span>' + escapeHtml(z.name) + '</span>';
      zutBox.appendChild(li);
    });
    const schrittBox = document.getElementById('detailSchritte');
    schrittBox.innerHTML = '';
    r.schritte.forEach((s, i) => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="s-nr">' + (i+1) + '</span><span>' + escapeHtml(s) + '</span>';
      schrittBox.appendChild(li);
    });
  }
  document.getElementById('btnPortionenMinus').addEventListener('click', () => {
    if (detailPortionen > 1) { detailPortionen--; renderDetailPortionenAbhaengig(rezepte.find(x => x.id === detailId)); }
  });
  document.getElementById('btnPortionenPlus').addEventListener('click', () => {
    detailPortionen++; renderDetailPortionenAbhaengig(rezepte.find(x => x.id === detailId));
  });
  document.getElementById('detailHerz').addEventListener('click', () => {
    const r = rezepte.find(x => x.id === detailId);
    if (!r) return;
    r.favorit = !r.favorit;
    speichernRezepte();
    const herz = document.getElementById('detailHerz');
    herz.textContent = r.favorit ? '♥' : '♡';
    herz.classList.toggle('aktiv', !!r.favorit);
    renderGrid();
  });
  document.getElementById('btnDetailSchliessen').addEventListener('click', () => document.getElementById('modalDetail').classList.remove('zeigen'));
  document.getElementById('modalDetail').addEventListener('click', (e) => { if (e.target.id === 'modalDetail') e.currentTarget.classList.remove('zeigen'); });

  // --- Zutaten in Einkaufsliste übernehmen (gleiche Origin -> gemeinsamer localStorage) ---
  document.getElementById('btnZumEinkauf').addEventListener('click', () => {
    const r = rezepte.find(x => x.id === detailId);
    if (!r) return;
    const faktor = detailPortionen / r.portionenBasis;
    let listen = laden(KEY_EINKAUF_LISTEN, null);
    if (!listen || !listen.length) {
      listen = [{ id: neueId('l'), name: 'Wocheneinkauf', items: [] }];
    }
    let aktivId = localStorage.getItem(KEY_EINKAUF_AKTIV);
    let aktiv = listen.find(l => l.id === aktivId) || listen[0];
    r.zutaten.forEach(z => {
      const menge = z.menge ? formatZahl(parseFloat(z.menge.toString().replace(',','.')) * faktor) : '';
      aktiv.items.push({ id: neueId('i'), name: z.name, menge: menge, einheit: z.einheit || '', kategorie: 'sonstiges', erledigt: false });
    });
    speichern(KEY_EINKAUF_LISTEN, listen);
    if (!aktivId) localStorage.setItem(KEY_EINKAUF_AKTIV, aktiv.id);
    alert(r.zutaten.length + ' Zutat(en) wurden zu „' + aktiv.name + '“ in Einkauf hinzugefügt.');
  });

  // --- BEARBEITEN / NEU ---
  function editKategorieReiheRendern(ausgewaehlt) {
    const reihe = document.getElementById('editKategorieReihe');
    reihe.innerHTML = '';
    KATEGORIEN.forEach(k => {
      const opt = document.createElement('button');
      opt.type = 'button';
      opt.className = 'kategorie-opt' + (k.id === ausgewaehlt ? ' aktiv' : '');
      opt.textContent = k.icon + ' ' + k.label;
      opt.dataset.id = k.id;
      if (k.id === ausgewaehlt) opt.style.background = k.farbe;
      opt.addEventListener('click', () => {
        reihe.querySelectorAll('.kategorie-opt').forEach(o => { o.classList.remove('aktiv'); o.style.background = ''; });
        opt.classList.add('aktiv');
        opt.style.background = k.farbe;
      });
      reihe.appendChild(opt);
    });
  }

  function zutatZeileErstellen(z) {
    z = z || { menge: '', einheit: '', name: '' };
    const zeile = document.createElement('div');
    zeile.className = 'zutat-zeile';
    zeile.innerHTML =
      '<input type="text" class="menge" placeholder="Menge" value="' + escapeHtml(z.menge || '') + '">' +
      '<input type="text" class="einheit" placeholder="Einheit" value="' + escapeHtml(z.einheit || '') + '">' +
      '<input type="text" class="name" placeholder="Zutat" value="' + escapeHtml(z.name || '') + '">' +
      '<button type="button" class="zeile-entfernen" aria-label="Entfernen">✕</button>';
    zeile.querySelector('.zeile-entfernen').addEventListener('click', () => zeile.remove());
    return zeile;
  }
  function schrittZeileErstellen(text, index) {
    const zeile = document.createElement('div');
    zeile.className = 'schritt-zeile';
    zeile.innerHTML =
      '<span class="schritt-nr">' + index + '.</span>' +
      '<textarea rows="2" placeholder="Was ist zu tun?">' + escapeHtml(text || '') + '</textarea>' +
      '<button type="button" class="zeile-entfernen" aria-label="Entfernen">✕</button>';
    zeile.querySelector('.zeile-entfernen').addEventListener('click', () => { zeile.remove(); schritteNummerierenNeu(); });
    return zeile;
  }
  function schritteNummerierenNeu() {
    document.querySelectorAll('#editSchritteListe .schritt-zeile .schritt-nr').forEach((el, i) => { el.textContent = (i+1) + '.'; });
  }

  document.getElementById('btnZutatHinzufuegen').addEventListener('click', () => {
    document.getElementById('editZutatenListe').appendChild(zutatZeileErstellen());
  });
  document.getElementById('btnSchrittHinzufuegen').addEventListener('click', () => {
    const box = document.getElementById('editSchritteListe');
    box.appendChild(schrittZeileErstellen('', box.children.length + 1));
  });

  function editModalOeffnen(r) {
    bearbeiteId = r ? r.id : null;
    document.getElementById('editTitelKopf').textContent = r ? 'Rezept bearbeiten' : 'Neues Rezept';
    document.getElementById('fTitel').value = r ? r.titel : '';
    document.getElementById('fPortionen').value = r ? r.portionenBasis : 4;
    document.getElementById('fZeit').value = r ? r.zeit : 30;
    document.getElementById('fNotiz').value = r ? (r.notiz || '') : '';
    editKategorieReiheRendern(r ? r.kategorie : 'hauptspeise');

    const zutBox = document.getElementById('editZutatenListe');
    zutBox.innerHTML = '';
    (r ? r.zutaten : [{menge:'',einheit:'',name:''}]).forEach(z => zutBox.appendChild(zutatZeileErstellen(z)));

    const schrittBox = document.getElementById('editSchritteListe');
    schrittBox.innerHTML = '';
    (r && r.schritte.length ? r.schritte : ['']).forEach((s, i) => schrittBox.appendChild(schrittZeileErstellen(s, i+1)));

    document.getElementById('editLoeschZeile').style.display = r ? '' : 'none';
    document.getElementById('modalEdit').classList.add('zeigen');
    document.getElementById('modalDetail').classList.remove('zeigen');
  }
  document.getElementById('btnNeu').addEventListener('click', () => editModalOeffnen(null));
  document.getElementById('btnDetailBearbeiten').addEventListener('click', () => {
    const r = rezepte.find(x => x.id === detailId);
    if (r) editModalOeffnen(r);
  });
  document.getElementById('btnEditAbbrechen').addEventListener('click', () => document.getElementById('modalEdit').classList.remove('zeigen'));
  document.getElementById('modalEdit').addEventListener('click', (e) => { if (e.target.id === 'modalEdit') e.currentTarget.classList.remove('zeigen'); });

  document.getElementById('btnEditSpeichern').addEventListener('click', () => {
    const titel = document.getElementById('fTitel').value.trim();
    if (!titel) { alert('Bitte einen Titel eingeben.'); return; }
    const gewaehlteKategorie = document.querySelector('#editKategorieReihe .kategorie-opt.aktiv');
    const portionenBasis = Math.max(1, parseInt(document.getElementById('fPortionen').value, 10) || 4);
    const zeit = Math.max(0, parseInt(document.getElementById('fZeit').value, 10) || 0);

    const zutaten = Array.from(document.querySelectorAll('#editZutatenListe .zutat-zeile')).map(zeile => ({
      id: neueId('z'),
      menge: zeile.querySelector('.menge').value.trim(),
      einheit: zeile.querySelector('.einheit').value.trim(),
      name: zeile.querySelector('.name').value.trim(),
    })).filter(z => z.name);

    const schritte = Array.from(document.querySelectorAll('#editSchritteListe .schritt-zeile textarea'))
      .map(t => t.value.trim()).filter(Boolean);

    if (!zutaten.length) { alert('Bitte mindestens eine Zutat eingeben.'); return; }
    if (!schritte.length) { alert('Bitte mindestens einen Zubereitungsschritt eingeben.'); return; }

    const neu = {
      id: bearbeiteId || neueId('r'),
      titel, kategorie: gewaehlteKategorie ? gewaehlteKategorie.dataset.id : 'sonstiges',
      portionenBasis, zeit, zutaten, schritte,
      notiz: document.getElementById('fNotiz').value.trim(),
      favorit: bearbeiteId ? (rezepte.find(x => x.id === bearbeiteId)?.favorit || false) : false,
    };
    if (bearbeiteId) rezepte = rezepte.map(r => r.id === bearbeiteId ? neu : r);
    else rezepte.push(neu);
    speichernRezepte();
    document.getElementById('modalEdit').classList.remove('zeigen');
    renderGrid();
  });

  document.getElementById('btnEditLoeschen').addEventListener('click', () => {
    if (!bearbeiteId) return;
    if (!confirm('Dieses Rezept wirklich löschen?')) return;
    rezepte = rezepte.filter(r => r.id !== bearbeiteId);
    speichernRezepte();
    document.getElementById('modalEdit').classList.remove('zeigen');
    renderGrid();
  });

  renderFilter();
  renderGrid();
})();
</script>
</body>
</html>
